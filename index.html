<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Family Chat</title>

<link rel="stylesheet" href="style.css">

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000">

</head>

<body>

<!-- =========================
ログイン画面
========================= -->

<div id="login-view">

<h1 class="login-title">Family Chat</h1>

<div class="card-container">

<!-- mayo -->
<div class="card" data-name="mayo">

<div class="avatar">
<img src="images/mayo.jpg">
</div>

<div class="card-name">まよ</div>

<div class="card-memo empty"
contenteditable="true"
data-placeholder="今日の一言"></div>

</div>


<!-- honoka -->
<div class="card" data-name="honoka">

<div class="avatar">
<img src="images/honoka.jpg">
</div>

<div class="card-name">ほのか</div>

<div class="card-memo empty"
contenteditable="true"
data-placeholder="今日の一言"></div>

</div>


<!-- ryo -->
<div class="card" data-name="ryo">

<div class="avatar">
<img src="images/ryo.jpg">
</div>

<div class="card-name">りょう</div>

<div class="card-memo empty"
contenteditable="true"
data-placeholder="今日の一言"></div>

</div>


<!-- shun -->
<div class="card" data-name="shun">

<div class="avatar">
<img src="images/shun.jpg">
</div>

<div class="card-name">しゅん</div>

<div class="card-memo empty"
contenteditable="true"
data-placeholder="今日の一言"></div>

</div>


<!-- satoshi -->
<div class="card" data-name="satoshi">

<div class="avatar">
<img src="images/satoshi.jpg">
</div>

<div class="card-name">さとし</div>

<div class="card-memo empty"
contenteditable="true"
data-placeholder="今日の一言"></div>

</div>

</div>

</div>


<!-- =========================
チャット画面
========================= -->

<div id="chat-view" style="display:none">

<header>

<div id="username"></div>

<button id="logout">logout</button>

</header>

<div class="messages"></div>

<div class="input-area">

<input type="text"
placeholder="メッセージ">

<button>送信</button>

</div>

</div>


<!-- =========================
Firebase
========================= -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

const firebaseConfig = {

apiKey: "YOUR_API_KEY",

authDomain: "YOUR_PROJECT.firebaseapp.com",

databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",

projectId: "YOUR_PROJECT",

storageBucket: "YOUR_PROJECT.appspot.com",

messagingSenderId: "XXXX",

appId: "XXXX"

};

firebase.initializeApp(firebaseConfig);

</script>


<!-- =========================
Scripts
========================= -->

<script src="login.js"></script>
<script src="chat.js"></script>


<!-- =========================
Service Worker
========================= -->

<script>

if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js")
.then(()=>console.log("ServiceWorker registered"));

}

</script>

</body>
</html>
